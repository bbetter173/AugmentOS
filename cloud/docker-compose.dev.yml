services:
  cloud:
    stop_grace_period: 5s
    init: true
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    ports:
      - "8002:80"
      - "8000:8000/udp"
    environment:
      - HOST=0.0.0.0
      - SERVICE_NAME=cloud
      - CONTAINER_ENVIRONMENT=true
      - CLOUD_HOST_NAME=cloud
    env_file:
      - .env
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - bun_cache:/root/.bun
    command: bash /app/docker/dev-start.sh
    tty: true
    stdin_open: true

volumes:
  app_node_modules:
  bun_cache:
