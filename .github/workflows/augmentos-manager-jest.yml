name: Mobile App Quality Checks

on:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/augmentos-manager-jest.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "mobile/**"
      - ".github/workflows/augmentos-manager-jest.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('mobile/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ./mobile
        run: bun install

      - name: Run TypeScript type check
        working-directory: ./mobile
        run: bun run compile

      - name: Run Jest tests
        working-directory: ./mobile
        run: bun run test
        env:
          CI: true
