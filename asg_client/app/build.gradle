plugins {
    id 'com.android.application'
    id 'androidx.navigation.safeargs'

    id 'io.sentry.android.gradle' version '5.8.0'
}

// 1. Import classes for file/stream and properties
import java.util.Properties

// 2. Create a Properties object and load from .env if present
def envFile = rootProject.file(".env")     // point to root project's .env
def Properties envProperties = new Properties()

if (envFile.exists()) {
    envProperties.load(new FileInputStream(envFile))
} else {
    logger.warn(".env file not found at ${envFile}")
}

/**
 * Release signing credentials from environment variables
 */
def asgStorePassword = project.hasProperty("ASG_STORE_PASSWORD") ? project.property("ASG_STORE_PASSWORD") : ""
def asgKeyPassword = project.hasProperty("ASG_KEY_PASSWORD") ? project.property("ASG_KEY_PASSWORD") : ""
def asgKeyAlias = project.hasProperty("ASG_KEY_ALIAS") ? project.property("ASG_KEY_ALIAS") : "asg"

// Find keystore: check shared location first, then local
def sharedKeystoreFile = new File(System.getProperty("user.home"), ".mentra/credentials/asg-keystore.jks")
def localKeystoreFile = file("../credentials/asg-keystore.jks")
def productionKeystoreFile = sharedKeystoreFile.exists() ? sharedKeystoreFile : localKeystoreFile
def useReleaseKey = productionKeystoreFile.exists() && asgStorePassword ? true : false

// Print signing configuration status during build
gradle.taskGraph.whenReady { taskGraph ->
    def isReleaseBuild = taskGraph.allTasks.any { it.name.toLowerCase().contains('release') }
    def isDebugBuild = taskGraph.allTasks.any { it.name.toLowerCase().contains('debug') }

    if (isReleaseBuild || isDebugBuild) {
        println ""
        println "╔════════════════════════════════════════════════════════════════╗"
        println "║                    ASG CLIENT SIGNING INFO                     ║"
        println "╠════════════════════════════════════════════════════════════════╣"

        if (isReleaseBuild) {
            if (useReleaseKey) {
                println "║  ✅ RELEASE BUILD: Using PRODUCTION signing key               ║"
                println "║     Keystore: ${productionKeystoreFile.absolutePath.take(50).padRight(50)}║"
                println "║     Key Alias: ${asgKeyAlias.padRight(48)}║"
            } else {
                println "║  ⚠️  RELEASE BUILD: Using DEBUG signing key (FALLBACK!)       ║"
                println "║                                                               ║"
                if (!productionKeystoreFile.exists()) {
                    println "║  WARNING: Production keystore not found!                      ║"
                    println "║  Missing: credentials/asg-keystore.jks                        ║"
                } else if (!asgStorePassword) {
                    println "║  WARNING: ASG_STORE_PASSWORD not set!                         ║"
                }
                println "║  This APK will NOT work for production distribution.          ║"
                println "║                                                               ║"
                println "║  To fix:                                                      ║"
                println "║  1. Place asg-keystore.jks in credentials/ directory          ║"
                println "║  2. Add to ~/.gradle/gradle.properties:                       ║"
                println "║     ASG_STORE_PASSWORD=xxx                                    ║"
                println "║     ASG_KEY_PASSWORD=xxx                                      ║"
                println "║     ASG_KEY_ALIAS=asg                                         ║"
            }
        }

        if (isDebugBuild && !isReleaseBuild) {
            if (useReleaseKey) {
                println "║  🔧 DEBUG BUILD: Using PRODUCTION signing key                 ║"
                println "║     Keystore: ${productionKeystoreFile.absolutePath.take(50).padRight(50)}║"
                println "║     Key Alias: ${asgKeyAlias.padRight(48)}║"
                println "║     ⚠️  Same signature as release builds                      ║"
            } else {
                println "║  🔧 DEBUG BUILD: Using default debug keystore (fallback)      ║"
                println "║     Keystore: ~/.android/debug.keystore                       ║"
                if (!productionKeystoreFile.exists()) {
                    println "║                                                               ║"
                    println "║  ℹ️  Production keystore not found (optional for debug)      ║"
                } else if (!asgStorePassword) {
                    println "║                                                               ║"
                    println "║  ℹ️  Production credentials not set (optional for debug)     ║"
                }
            }
        }

        println "╚════════════════════════════════════════════════════════════════╝"
        println ""

        // Check Sentry configuration status (from .env file)
        def sentryDsn = envProperties['SENTRY_DSN'] ?: ""
        def sentryAuthToken = System.getenv("SENTRY_AUTH_TOKEN") ?:
                             (project.hasProperty("sentryAuthToken") ? project.property("sentryAuthToken") : null)

        def isSentryConfigured = sentryDsn && !sentryDsn.isEmpty() && sentryDsn.contains("sentry.io")

        println "╔════════════════════════════════════════════════════════════════╗"
        println "║                    SENTRY ERROR REPORTING                      ║"
        println "╠════════════════════════════════════════════════════════════════╣"

        if (isSentryConfigured) {
            println "║  ✅ SENTRY: ENABLED - Crashes will be reported                 ║"
            println "║     Config: .env file                                         ║"
            if (sentryAuthToken) {
                println "║     Source Maps: ✅ Will be uploaded                          ║"
            } else {
                println "║     Source Maps: ❌ SENTRY_AUTH_TOKEN not set                 ║"
            }
        } else {
            println "║  ⚠️  SENTRY: DISABLED - Crashes will NOT be reported to cloud  ║"
            println "║                                                               ║"
            println "║  Local file logging is still enabled at:                      ║"
            println "║     /sdcard/mentra_crash_logs/                                ║"
            println "║                                                               ║"
            println "║  To enable Sentry:                                            ║"
            println "║  1. Copy .env.example to .env                                 ║"
            println "║  2. Set SENTRY_DSN=https://xxx@sentry.io/xxx                  ║"
        }

        println "╚════════════════════════════════════════════════════════════════╝"
        println ""
    }
}

android {
    namespace 'com.mentra.asg_client'
    compileSdk 34


    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17 // Or VERSION_1_8, VERSION_11, etc.
        targetCompatibility JavaVersion.VERSION_17 // Should generally match sourceCompatibility
    }

    signingConfigs {
        debug {
            // Use production keystore for debug builds if available (maintains app identity)
            // Otherwise fall back to default debug keystore
            if (productionKeystoreFile.exists() && asgStorePassword) {
                storeFile productionKeystoreFile
                storePassword = asgStorePassword
                keyAlias = asgKeyAlias
                keyPassword = asgKeyPassword
            } else {
                // Fall back to Android's default debug keystore
                def userHome = System.getProperty("user.home")
                storeFile file("${userHome}/.android/debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
        release {
            // Use production keystore for release builds if available
            // Otherwise fall back to debug keystore (with warning)
            if (productionKeystoreFile.exists() && asgStorePassword) {
                storeFile productionKeystoreFile
                storePassword = asgStorePassword
                keyAlias = asgKeyAlias
                keyPassword = asgKeyPassword
            } else {
                // Fall back to debug keystore (release will not be production-ready)
                def userHome = System.getProperty("user.home")
                storeFile file("${userHome}/.android/debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }

    buildFeatures {
        aidl = true
    }

    // Disable lint to allow build to proceed despite existing issues
    lintOptions {
        abortOnError false
        checkReleaseBuilds false
    }

    defaultConfig {
        applicationId "com.mentra.asg_client"

        minSdk 28
        targetSdk 33
        versionCode 34
        versionName "34.0"

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        testInstrumentationRunnerArguments deviceId: "RZCW92DJWVF"

        // 3. Inject environment variables into BuildConfig
        //    Using them as strings for simplicity.
        //    If you want a boolean, see the note below.

        buildConfigField "String", "MENTRAOS_HOST", "\"${envProperties['MENTRAOS_HOST'] ?: ""}\""
        buildConfigField "String", "MENTRAOS_PORT", "\"${envProperties['MENTRAOS_PORT'] ?: ""}\""
        buildConfigField "String", "MENTRAOS_SECURE", "\"${envProperties['MENTRAOS_SECURE'] ?: ""}\""

        // Sentry configuration
        buildConfigField "String", "SENTRY_DSN", "\"${envProperties['SENTRY_DSN'] ?: ""}\""
    }

    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1,DEPENDENCIES}'
            excludes += '/META-INF/INDEX.LIST'
            excludes += "com/augmentos/augmentoslib/DataStreamType.class"
        }
        // Handle potential conflicts with SSL libraries from StreamPackLite
        pickFirst '**/*.so'
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // Third-party developers (without Mentra's signing key) get a different
            // package name so their build can coexist with the stock system app.
            // This is required because Android won't allow installing a differently-signed
            // APK with the same package name as a system app.
            if (!useReleaseKey) {
                applicationIdSuffix ".thirdparty"
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig asgStorePassword ? signingConfigs.release : signingConfigs.debug
            // Third-party release builds also need the suffix
            if (!useReleaseKey) {
                applicationIdSuffix ".thirdparty"
            }
        }
    }
}


